<button class="button-40" role="button" (click)="addNewRecipeClicked()">
  Add New Recipe
</button>

<h1>This is a list of all available recipes</h1>

<app-loader *ngIf="!recipesLoaded"></app-loader>

<app-recipe-summary
  *ngFor="let recipe of recipes"
  [recipe]="recipe"
  (recipeClicked)="recipeClicked($event)"
></app-recipe-summary>
